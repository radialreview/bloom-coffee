services:
  - type: web
    name: bloom_coffee
    runtime: ruby
    plan: free
    buildCommand: './bin/render-build.sh'
    startCommand: './bin/rails server'
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bloom_coffee-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 2
databases:
  - name: bloom_coffee-db
    plan: free