services:
  - type: web
    name: bloom-coffee
    runtime: ruby
    rootDir: app
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "./bin/rails server"
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bloom-coffee-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: WEB_CONCURRENCY
        value: "2"

databases:
  - name: bloom-coffee-db
    plan: free
