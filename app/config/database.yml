# PostgreSQL for all environments.
# Development/test: local Postgres (brew services start postgresql…).
# Production: DATABASE_URL from Render (or any host).

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("PGHOST", "localhost") %>
  port: <%= ENV.fetch("PGPORT", 5432) %>
  username: <%= ENV.fetch("PGUSER") { ENV["USER"] } %>
  password: <%= ENV["PGPASSWORD"] %>

development:
  <<: *default
  database: bloom_coffee_development

test:
  <<: *default
  database: bloom_coffee_test

# Solid Cache / Queue / Cable share one Postgres on Render (same DATABASE_URL).
production:
  primary:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/cable_migrate
